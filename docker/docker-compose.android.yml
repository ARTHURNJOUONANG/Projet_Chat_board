# Build APK Android (atelier Capacitor) — ne pas confondre avec docker-compose.yml (app web)
version: '3.8'

services:
  android-builder:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ..:/workspace/app
      - ../generated:/workspace/generated
      - android-npm-cache:/root/.npm
      - android-gradle-cache:/root/.gradle
    environment:
      - APP_NAME=${APP_NAME:-CareerAI}
      - APP_ID=${APP_ID:-live.careerai.app}
      - CAPACITOR_REMOTE_URL=${CAPACITOR_REMOTE_URL:-https://www.careerai.live}
      - CAPACITOR_STATIC_EXPORT=${CAPACITOR_STATIC_EXPORT:-false}
    remove: true

volumes:
  android-npm-cache:
  android-gradle-cache:
