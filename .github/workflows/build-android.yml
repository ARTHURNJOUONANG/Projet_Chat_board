# Pipeline APK Android — atelier Keyce (Capacitor)
# Déclenché sur push main/develop ou manuellement (workflow_dispatch)

name: Build Android APK

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    name: Build APK Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Configuration Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Configuration Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'
          accept-android-sdk-licenses: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Installation des dépendances npm
        run: npm ci

      - name: Préparer webDir Capacitor (mode distante CareerAI)
        env:
          CAPACITOR_REMOTE_URL: https://www.careerai.live
        run: node scripts/prepare-mobile-webdir.js

      - name: Initialisation Capacitor Android
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Permissions Gradle
        working-directory: android
        run: chmod +x gradlew

      - name: Compilation APK Debug
        working-directory: android
        run: |
          VERSION_CODE=${{ github.run_number }}
          VERSION_NAME="1.0.${{ github.run_number }}"
          ./gradlew assembleDebug \
            -PversionCode=$VERSION_CODE \
            -PversionName=$VERSION_NAME \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx3g"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: careerai-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Résumé du build
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          APK_SIZE=$(du -sh "$APK_PATH" | cut -f1)
          echo "## ✅ Build Android CareerAI réussi" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Information | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Fichier | app-debug.apk |" >> $GITHUB_STEP_SUMMARY
          echo "| Taille | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Mode | WebView → https://www.careerai.live |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branche | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY

      - name: Notification d'échec
        if: failure()
        run: |
          echo "## ❌ Build Android échoué" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Causes fréquentes :**" >> $GITHUB_STEP_SUMMARY
          echo "- Dépendances npm / Capacitor manquantes" >> $GITHUB_STEP_SUMMARY
          echo "- capacitor.config.json absent" >> $GITHUB_STEP_SUMMARY
          echo "- Erreur Gradle (SDK, licences)" >> $GITHUB_STEP_SUMMARY
